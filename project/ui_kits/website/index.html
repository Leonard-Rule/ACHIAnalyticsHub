<!-- @dsCard group="Website" viewport="1280x760" name="ACHI.net — Home" subtitle="Marketing & research site: home + publications, interactive" -->
<!-- @startingPoint section="Website" subtitle="Full ACHI.net site: home, publications, nav, footer" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHI.net — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); }
  .wrap { max-width: var(--container-max); margin: 0 auto; padding: 0 24px; }
  .section { padding: var(--space-9) 0; }
  .section--tint { background: var(--surface-tint); }
  .section__head { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: var(--space-6); flex-wrap: wrap; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .wmark { font-family: var(--font-display); font-weight: 800; font-size: 30px; letter-spacing: .02em; line-height: 1; }

  /* Utility bar */
  .util { background: var(--brand-primary-strong); color: #fff; font-size: 13px; }
  .util__inner { max-width: var(--container-max); margin: 0 auto; padding: 7px 24px; display: flex; justify-content: space-between; align-items: center; }
  .util__latest { display: flex; align-items: center; gap: 8px; color: var(--achi-blue-100); }
  .util__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--achi-teal-300); }
  .util__social { display: flex; gap: 16px; color: var(--achi-blue-100); font-weight: 600; }
  .util__social span { cursor: pointer; }
  .util__social span:hover { color: #fff; }

  /* Nav */
  .nav { border-bottom: 1px solid var(--border-default); background: #fff; position: sticky; top: 0; z-index: 20; }
  .nav__inner { max-width: var(--container-max); margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 76px; }
  .nav__logo { text-decoration: none; }
  .nav__links { display: flex; gap: 4px; margin-left: auto; align-items: center; }
  .nav__item { position: relative; }
  .nav__link { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--text-body); text-decoration: none; padding: 10px 14px; border-radius: var(--radius-sm); }
  .nav__link:hover { color: var(--brand-primary); background: var(--surface-sunken); }
  .nav__link.is-active { color: var(--brand-accent-strong); }
  .nav__caret { font-size: 10px; }
  .nav__menu { position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid var(--border-default); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); padding: 8px; min-width: 280px; display: flex; flex-direction: column; }
  .nav__menu a { font-family: var(--font-body); font-size: 14px; color: var(--text-body); text-decoration: none; padding: 9px 12px; border-radius: var(--radius-sm); }
  .nav__menu a:hover { background: var(--surface-tint); color: var(--brand-primary); }
  .nav__search { margin-left: 4px; background: none; border: 0; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: var(--radius-sm); display: flex; }
  .nav__search:hover { color: var(--brand-primary); background: var(--surface-sunken); }

  /* Hero */
  .hero { position: relative; background: linear-gradient(120deg, var(--achi-navy-900) 0%, var(--achi-navy) 45%, var(--achi-teal-700) 100%); color: #fff; overflow: hidden; }
  .hero__overlay { position: absolute; inset: 0; background:
      radial-gradient(900px 500px at 80% -10%, rgba(127,205,215,.30), transparent 60%),
      radial-gradient(700px 600px at 0% 120%, rgba(118,33,70,.35), transparent 55%); }
  .hero__inner { position: relative; max-width: var(--container-max); margin: 0 auto; padding: 96px 24px 104px; }
  .hero__eyebrow { font-family: var(--font-display); font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--achi-teal-300); margin: 0 0 18px; }
  .hero__title { font-family: var(--font-display); font-weight: 800; font-size: 60px; line-height: 1.05; letter-spacing: -0.02em; max-width: 16ch; margin: 0 0 22px; text-wrap: balance; color: #fff; }
  .hero__lead { font-size: 20px; line-height: 1.6; color: var(--achi-blue-100); max-width: 60ch; margin: 0 0 32px; }
  .hero__cta { display: flex; gap: 14px; flex-wrap: wrap; }
  .hero__ghost { background: transparent !important; color: #fff !important; border-color: rgba(255,255,255,.5) !important; }
  .hero__ghost:hover { background: rgba(255,255,255,.12) !important; }

  /* Stat band */
  .band { background: var(--brand-primary); }
  .band__inner { max-width: var(--container-max); margin: 0 auto; padding: 40px 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; }

  /* Feature */
  .feature { display: grid; grid-template-columns: 1.3fr 1fr; gap: 40px; align-items: center; margin-top: var(--space-6); }
  .feature__media { aspect-ratio: 16/10; border-radius: var(--radius-lg); background: linear-gradient(135deg, var(--achi-teal) 0%, var(--achi-navy) 100%); box-shadow: var(--shadow-md); }
  .feature__body { display: flex; flex-direction: column; align-items: flex-start; gap: 16px; }
  .feature__body p { color: var(--text-body); font-size: 18px; line-height: 1.6; margin: 0; }

  /* Pillars */
  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: var(--space-6); }
  .pillar { background: #fff; border: 1px solid var(--border-subtle); border-top: 4px solid var(--c); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm); }
  .pillar__mark { display: block; width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--c); opacity: .14; margin-bottom: 16px; }
  .pillar h3 { font-family: var(--font-display); font-size: 22px; margin: 0 0 8px; color: var(--text-strong); }
  .pillar p { margin: 0; color: var(--text-muted); font-size: 15px; line-height: 1.55; }

  /* Page header (publications) */
  .page-hd { background: var(--surface-tint); padding: 64px 0; border-bottom: 1px solid var(--border-subtle); }

  /* Filters */
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: var(--space-6); }
  .filter { font-family: var(--font-body); font-weight: 600; font-size: 14px; color: var(--text-body); background: #fff; border: 1px solid var(--border-default); border-radius: var(--radius-pill); padding: 8px 16px; cursor: pointer; transition: all var(--dur-fast) var(--ease-standard); }
  .filter:hover { border-color: var(--brand-accent); color: var(--brand-accent-strong); }
  .filter.is-on { background: var(--brand-primary); border-color: var(--brand-primary); color: #fff; }

  /* Pager */
  .pager { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: var(--space-8); }
  .pager__n { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); }

  /* Newsletter CTA */
  .cta { background: var(--brand-secondary); color: #fff; }
  .cta__inner { max-width: var(--container-max); margin: 0 auto; padding: 56px 24px; display: flex; justify-content: space-between; align-items: center; gap: 40px; flex-wrap: wrap; }
  .cta h2 { font-family: var(--font-display); font-size: 32px; margin: 0 0 8px; color: #fff; }
  .cta p { margin: 0; color: var(--achi-maroon-100); font-size: 17px; max-width: 48ch; }
  .cta__form { display: flex; gap: 10px; }
  .cta__form input { font-family: var(--font-body); font-size: 16px; padding: 13px 16px; border: 1px solid transparent; border-radius: var(--radius-sm); min-width: 260px; }
  .cta__form input:focus { outline: none; box-shadow: var(--focus-ring); }

  /* Footer */
  .site-ft { background: var(--achi-navy-900); color: var(--achi-blue-100); }
  .site-ft__inner { max-width: var(--container-max); margin: 0 auto; padding: 56px 24px; display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 40px; }
  .site-ft__addr { font-size: 14px; line-height: 1.6; margin: 16px 0 0; color: var(--achi-blue-300); }
  .site-ft__col h4 { font-family: var(--font-display); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #fff; margin: 0 0 14px; }
  .site-ft__col ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .site-ft__col a { color: var(--achi-blue-100); text-decoration: none; font-size: 14px; }
  .site-ft__col a:hover { color: #fff; }
  .site-ft__bar { border-top: 1px solid rgba(255,255,255,.12); }
  .site-ft__bar > * { }
  .site-ft__bar { max-width: 100%; }
  .site-ft__bar { display: flex; }
  .site-ft__bar { max-width: var(--container-max); margin: 0 auto; padding: 20px 24px; justify-content: space-between; align-items: center; font-size: 13px; color: var(--achi-blue-300); }
  .site-ft__social { display: flex; gap: 16px; }
  .site-ft__social span { cursor: pointer; }
  .site-ft__social span:hover { color: #fff; }

  @media (max-width: 920px) {
    .nav__links { display: none; }
    .grid3, .pillars, .band__inner { grid-template-columns: 1fr 1fr; }
    .feature { grid-template-columns: 1fr; }
    .hero__title { font-size: 40px; }
    .site-ft__inner { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="SiteChrome.jsx"></script>
  <script type="text/babel" src="HomePage.jsx"></script>
  <script type="text/babel" src="PublicationsPage.jsx"></script>
  <script type="text/babel">
    const { SiteHeader, SiteFooter, HomePage, PublicationsPage } = window;
    function App() {
      const [page, setPage] = React.useState('Home');
      const onNav = (p) => {
        const map = { Home: 'Home', Publications: 'Publications' };
        setPage(map[p] || 'Home');
        window.scrollTo({ top: 0 });
      };
      return (
        <React.Fragment>
          <SiteHeader current={page} onNav={onNav} onSearch={() => {}} />
          {page === 'Publications' ? <PublicationsPage /> : <HomePage onNav={onNav} />}
          <SiteFooter onNav={onNav} />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
