<!-- @dsCard group="Colors" viewport="700x180" name="Accent — Teal & Maroon" subtitle="Confirmed brand teal and maroon secondary" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.06); }
  .name { font-family: var(--font-body); font-weight: var(--fw-semibold); font-size: 13px; color: var(--text-strong); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .tag { display:inline-block; font-family: var(--font-body); font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color: var(--brand-accent-strong); margin-left:6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--achi-teal-700)"></div><div class="name">Teal 700</div><div class="hex">#0c7c8c</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-teal)"></div><div class="name">Teal<span class="tag">Accent</span></div><div class="hex">#16a0b3</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-teal-100)"></div><div class="name">Teal 100</div><div class="hex">#d6eef1</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-maroon-700)"></div><div class="name">Maroon 700</div><div class="hex">#5c1a37</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-maroon)"></div><div class="name">Maroon</div><div class="hex">#762146</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-maroon-100)"></div><div class="name">Maroon 100</div><div class="hex">#efdde4</div></div>
  </div>
</body>
</html>
