<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals & Mist" subtitle="Cool clinical gray ramp + confirmed mist surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-body); }
  .ramp { display: flex; gap: 6px; }
  .ramp .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,.06); }
  .lbl { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align:center; }
  .mist { display:flex; gap:14px; margin-top:16px; }
  .mist .sw { flex:1; }
  .mist .chip { height: 44px; }
  .name { font-weight: var(--fw-semibold); font-size: 12px; color: var(--text-strong); margin-top:6px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--achi-white);border-color:var(--border-default)"></div><div class="lbl">white</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-25)"></div><div class="lbl">25</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-50)"></div><div class="lbl">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-100)"></div><div class="lbl">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-200)"></div><div class="lbl">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-300)"></div><div class="lbl">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-400)"></div><div class="lbl">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-500)"></div><div class="lbl">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-600)"></div><div class="lbl">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-700)"></div><div class="lbl">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-gray-800)"></div><div class="lbl">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-ink)"></div><div class="lbl">ink</div></div>
  </div>
  <div class="mist">
    <div class="sw"><div class="chip" style="background:var(--achi-mist)"></div><div class="name">Mist</div><div class="hex">#e8f1f2</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-mist-deep)"></div><div class="name">Mist Deep</div><div class="hex">#d4e4e7</div></div>
  </div>
</body>
</html>
