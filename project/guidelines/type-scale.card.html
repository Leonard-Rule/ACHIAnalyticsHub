<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Major-third scale, display → caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-subtle); padding: 5px 0; }
  .line:last-child { border-bottom: 0; }
  .specimen { font-family: var(--font-display); font-weight: var(--fw-bold); color: var(--text-strong); letter-spacing: var(--ls-tight); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="specimen" style="font-size:42px">Healthier Arkansas</span><span class="tok">h1 · 60</span></div>
  <div class="line"><span class="specimen" style="font-size:32px">Healthier Arkansas</span><span class="tok">h2 · 48</span></div>
  <div class="line"><span class="specimen" style="font-size:26px">Healthier Arkansas</span><span class="tok">h3 · 36</span></div>
  <div class="line"><span class="specimen" style="font-size:20px">Healthier Arkansas</span><span class="tok">h4 · 30</span></div>
  <div class="line"><span class="specimen" style="font-size:16px;font-family:var(--font-body);font-weight:400">Healthier Arkansas — body copy</span><span class="tok">body · 16</span></div>
  <div class="line"><span class="specimen" style="font-size:13px;font-family:var(--font-body);font-weight:400;color:var(--text-muted)">Healthier Arkansas — caption</span><span class="tok">caption · 13</span></div>
</body>
</html>
