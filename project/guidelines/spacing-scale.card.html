<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid, space-1 → space-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); font-family: var(--font-body); }
  .row { display:flex; align-items:center; gap: 14px; padding: 3px 0; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--text-strong); width: 92px; }
  .px { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); width: 46px; }
  .bar { height: 14px; background: var(--brand-accent); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">space-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">space-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">space-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">space-5</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">space-6</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">space-8</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">space-10</span><span class="px">80</span><div class="bar" style="width:80px"></div></div>
</body>
</html>
