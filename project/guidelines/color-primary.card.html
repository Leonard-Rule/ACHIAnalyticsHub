<!-- @dsCard group="Colors" viewport="700x180" name="Primary — Blue" subtitle="Navy primary & supporting blues" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 76px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.06); }
  .name { font-family: var(--font-body); font-weight: var(--fw-semibold); font-size: 13px; color: var(--text-strong); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .tag { display:inline-block; font-family: var(--font-body); font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color: var(--brand-accent-strong); margin-left:6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--achi-navy-900)"></div><div class="name">Navy 900</div><div class="hex">#003049</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-navy-800)"></div><div class="name">Navy 800</div><div class="hex">#003f63</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-navy)"></div><div class="name">Navy<span class="tag">Primary</span></div><div class="hex">#00558c</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-blue)"></div><div class="name">Blue</div><div class="hex">#0a78bf</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-blue-300)"></div><div class="name">Blue 300</div><div class="hex">#6fb4dd</div></div>
    <div class="sw"><div class="chip" style="background:var(--achi-blue-100)"></div><div class="name">Blue 100</div><div class="hex">#cfe6f4</div></div>
  </div>
</body>
</html>
