<!-- @dsCard group="Brand" viewport="700x210" name="Three pillars" subtitle="Healthy Systems · Communities · Choices" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display:flex; gap: 16px; font-family: var(--font-body); }
  .pillar { flex:1; border: 1px solid var(--border-subtle); border-top: 3px solid var(--c); border-radius: var(--radius-md); padding: 16px; }
  .h { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: 16px; color: var(--text-strong); margin: 0 0 6px; }
  .d { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0; }
</style>
</head>
<body>
  <div class="pillar" style="--c:var(--achi-navy)">
    <p class="h">Healthy Systems</p>
    <p class="d">Quality care, equitable practices, and affordable methods of delivery and payment.</p>
  </div>
  <div class="pillar" style="--c:var(--achi-teal)">
    <p class="h">Healthy Communities</p>
    <p class="d">Culturally informed solutions and accessible opportunities across ZIP codes.</p>
  </div>
  <div class="pillar" style="--c:var(--achi-maroon)">
    <p class="h">Healthy Choices</p>
    <p class="d">Ideas and strategies affecting lifestyles, decisions, and outcomes.</p>
  </div>
</body>
</html>
