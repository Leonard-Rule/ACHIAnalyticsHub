<!-- @dsCard group="Brand" viewport="700x190" name="Logo lockup" subtitle="Wordmark recreation — supply official logo files to replace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); display:flex; gap: 40px; align-items:center; }
  .panel { flex:1; display:flex; flex-direction:column; gap:18px; }
  .lockup { display:flex; align-items:center; gap: 14px; }
  .mark { font-family: var(--font-display); font-weight: var(--fw-extra); font-size: 40px; letter-spacing: 0.02em; color: var(--brand-primary); line-height:1; }
  .mark .dot { color: var(--brand-accent); }
  .full { font-family: var(--font-display); font-weight: var(--fw-semibold); font-size: 12px; letter-spacing: 0.02em; color: var(--text-muted); line-height: 1.3; max-width: 150px; border-left: 2px solid var(--border-default); padding-left: 14px; }
  .ondark { background: var(--brand-primary); border-radius: var(--radius-md); padding: 18px 22px; }
  .ondark .mark { color: #fff; }
  .ondark .mark .dot { color: var(--achi-teal-300); }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="panel">
    <div class="lockup">
      <span class="mark">ACH<span class="dot">I</span></span>
      <span class="full">Arkansas Center for Health Improvement</span>
    </div>
    <div class="ondark"><span class="mark">ACH<span class="dot">I</span></span></div>
  </div>
  <div class="note">Placeholder recreation.<br>Replace with official<br>logo artwork.</div>
</body>
</html>
