<!-- @dsCard group="Brand" viewport="700x170" name="Voice" subtitle="Nonpartisan, evidence-first, plain-spoken" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-tint); font-family: var(--font-body); }
  .quote { font-family: var(--font-display); font-weight: var(--fw-semibold); font-size: 22px; line-height: 1.3; color: var(--text-strong); max-width: 600px; margin: 0; border-left: var(--rule-accent) solid var(--brand-accent); padding-left: 18px; letter-spacing: -0.01em; }
  .tags { display:flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .tag { font-size: 12px; font-weight: 600; color: var(--brand-primary); background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-pill); padding: 4px 12px; }
</style>
</head>
<body>
  <p class="quote">“Status quo is not the future state of health. We convert data into knowledge and insight to inform healthy choices and policies.”</p>
  <div class="tags">
    <span class="tag">Nonpartisan</span>
    <span class="tag">Evidence-first</span>
    <span class="tag">Plain-spoken</span>
    <span class="tag">Hopeful, not alarmist</span>
  </div>
</body>
</html>
