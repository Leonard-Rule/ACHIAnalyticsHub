[build]
  # Everything in /site/ is what gets served
  publish = "site"
  command = "echo 'No build step needed — static site'"

# Redirect /admin to the CMS
[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# Serve content files — JS fetches these at runtime
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"
    Access-Control-Allow-Origin = "*"

# Cache static assets aggressively
[[headers]]
  for = "/site/app.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Enable Netlify Identity for CMS auth (if using git-gateway backend)
# [identity]
#   registration = "invite_only"   # only invited users can register

# Netlify CMS auth callback
[[redirects]]
  from = "/api/auth"
  to   = "/.netlify/functions/auth"
  status = 200
