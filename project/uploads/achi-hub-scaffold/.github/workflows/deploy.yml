name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate JSON content files
        run: |
          echo "Validating all JSON content files..."
          find content/ -name "*.json" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "✓ $f" || (echo "✗ $f is invalid JSON" && exit 1)
          done
          echo "All JSON files valid."

      - name: Check snippet manifest references
        run: |
          echo "Checking snippet manifest references..."
          python3 - << 'EOF'
          import json, os, sys

          with open('content/snippets/manifest.json') as f:
            manifest = json.load(f)

          errors = []
          for snippet in manifest:
            if snippet.get('file') and snippet.get('status') == 'active':
              path = f"content/snippets/{snippet['file']}"
              if not os.path.exists(path):
                errors.append(f"Missing snippet file: {path} (referenced by id={snippet['id']})")

          if errors:
            print("Snippet reference errors:")
            for e in errors:
              print(f"  ✗ {e}")
            sys.exit(1)
          else:
            print(f"✓ All {len(manifest)} snippet manifest entries checked")
          EOF

      - name: Deploy to Netlify (preview on PR, production on main push)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './site'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
